<!DOCTYPE html>
<html>
<head>
    <title>WoofwoofOS</title>
    <style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-image: url('/IMG_0744.JPG');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        color: lime;
    }

    #dock {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        background-color: #333;
        padding: 20px 40px;
        border-radius: 20px;
        display: flex;
        gap: 20px;
    }

    #dock button {
        background-color: transparent;
        border: none;
        cursor: pointer;
        padding: 15px;
        color: white;
        border-radius: 10px;
    }

    #menu-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background-color: #333;
        color: white;
        height: 40px;
        display: flex;
    }
    #menu-bar button {
        background-color: transparent;
        border: none;
        cursor: pointer;
        color: white;
    }
    </style>
</head>
<body>
    <div id="menu-bar">
        <button onclick="alert('WoofwoofOS version 1.0.0');">About</button>
        <button onclick="window.location.href = '/shutdown.html';">Shut Down</button>
        <button onclick="window.location.href = '/index.html';">Restart</button>
    </div>
    <div id="dock">
        <button>Dog</button>
    </div>
</body>
</html>
