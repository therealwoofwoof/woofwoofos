<!DOCTYPE html>
<html>
<head>
    <title>WoofwoofOS</title>
    <style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-image: url('/IMG_0744.JPG');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        color: lime;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    #menu-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background-color: #333;
        color: white;
        height: 40px;
        display: flex;
        z-index: 10;
    }

    #app-window {
        flex: 1;
        margin-top: 40px;
        margin-bottom: 80px;
        overflow: auto;
        position: relative;
        background-color: rgba(0, 0, 0, 0.8);
        color: white;
        border-radius: 10px;
        padding: 10px;
        box-sizing: border-box;
        display: none;
    }

    #app-window iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    #close-button {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: #555;
        border: none;
        color: white;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
    }

    #dock {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        background-color: #333;
        padding: 20px 40px;
        border-radius: 20px;
        display: flex;
        gap: 20px;
        z-index: 10;
    }

    #dock button {
        background-color: #555;
        border: none;
        cursor: pointer;
        padding: 15px;
        color: white;
        border-radius: 10px;
    }

    #dock button img {
        width: 30px;
        height: 30px;
    }

    #menu-bar button {
        background-color: #555;
        border: none;
        cursor: pointer;
        color: white;
    }
    </style>
</head>
<body>
    <div id="menu-bar">
        <button onclick="window.location.href = '/';">Restart</button>
    </div>

    <div id="app-window">
        <button id="close-button" onclick="document.getElementById('app-window').style.display='none';">Close</button>
        <iframe src="" id="app-frame"></iframe>
    </div>

    <div id="dock">
        <button onclick="alert('You got Woofed!'); window.location.href = '/error.html';">Woofed</button>
        <button id="woofvm">WoofVM</button>

        <script>
            document.getElementById('woofvm').onclick = () => {
                document.getElementById('app-frame').src = '/';
                document.getElementById('app-window').style.display = 'block';
            };
        </script>
    </div>
</body>
</html>
