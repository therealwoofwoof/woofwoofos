<!DOCTYPE html>
<html>
<head>
    <title>WoofwoofOS</title>
    <style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #4f7043;
        color: lime;
    }

    #dock {
        position: fixed; /* Fix the dock to the bottom */
        bottom: 0; /* Align it to the bottom */
        left: 50%; /* Center the dock horizontally */
        transform: translateX(-50%); /* Center alignment */
        background-color: #333; /* Grey background for the dock */
        padding: 20px 40px; /* Increase padding for a larger dock */
        border-radius: 20px; /* Larger rounded corners */
        display: flex; /* Use flexbox for alignment */
        gap: 20px; /* Add more spacing between dock items */
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); /* Add a shadow for a floating effect */
    }

    #dock button {
        background-color: gray; /* Transparent background for dock items */
        border: none; /* Remove borders */
        cursor: pointer; /* Pointer cursor for interactivity */
        padding: 15px; /* Increase padding for larger clickable area */
        color: white;
        border-radius: 10px;
    }
    </style>
</head>
<body>
    <h1>Welcome to WoofwoofOS!</h1>
    <p>The long awaited WoofwoofOS is here!</p>
    <div id="dock">
        <button onclick="alert('WoofwoofOS version 1.0.0')">About</button>
        <button onclick="alert('You got Woofed!')">Random App</button>
    </div>
</body>
</html>
