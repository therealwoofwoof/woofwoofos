<!DOCTYPE html>
<html>
<head>
    <title>WoofwoofOS</title>
    <style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-image: url('/IMG_0744.JPG');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        color: lime;
    }

    #dock {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        background-color: #333;
        padding: 20px 40px;
        border-radius: 20px;
        display: flex;
        gap: 20px;
    }

    #dock button {
        background-color: transparent;
        border: none;
        cursor: pointer;
        padding: 15px;
        color: white;
        border-radius: 10px;
    }
    </style>
</head>
<body>
    <div id="dock">
        <button>Dog</button>
    </div>
</body>
</html>
